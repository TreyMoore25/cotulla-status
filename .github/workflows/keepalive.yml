name: Keep Alive

on:
  schedule:
    - cron: '*/5 * * * *'  # every 5 minutes
  workflow_dispatch:        # allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping status page
        run: |
          curl -fsS --max-time 30 https://cotulla-uptime.azurewebsites.net/ > /dev/null
          echo "Ping successful at $(date -u)"
